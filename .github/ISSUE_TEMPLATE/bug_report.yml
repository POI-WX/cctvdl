name: Bug 报告
description: 报告一个问题，帮助我们改进
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈！请尽量填写下列信息，便于定位问题。
  - type: textarea
    id: what-happened
    attributes:
      label: 问题描述
      description: 发生了什么？你期望的行为是什么？
      placeholder: 清晰描述问题现象与预期。
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
      description: 一步步说明如何复现。
      placeholder: |
        1. 导入栏目 ...
        2. 选择清晰度 ...
        3. 点击下载 ...
        4. 出现 ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: cctvdl 版本
      placeholder: 例如 0.1.1（关于弹窗可查看）
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志
      description: 如有相关日志请粘贴（设置页可查看日志目录）。注意脱敏个人信息。
      render: shell
    validations:
      required: false
