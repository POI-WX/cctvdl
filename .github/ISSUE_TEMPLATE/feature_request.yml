name: 功能建议
description: 提出一个新功能或改进想法
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 这个功能要解决什么痛点？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案
      description: 你希望它如何工作？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过的其它做法（可选）。
    validations:
      required: false
